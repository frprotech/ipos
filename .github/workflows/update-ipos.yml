name: Update IPO data

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # allow manual runs from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-ipos
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch IPO data
        run: python scripts/fetch_ipos.py

      - name: Fetch RTO / name-change data
        run: python scripts/fetch_rtos.py

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/ipos.json data/rtos.json; then
            git add data/ipos.json data/rtos.json
            git commit -m "chore: refresh IPO and RTO data"
            git push
          else
            echo "No data changes."
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update
    runs-on: ubuntu-latest
    # Deploy fails harmlessly until GitHub Pages (source: GitHub Actions)
    # is enabled in the repository settings.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
