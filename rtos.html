<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Name &amp; Symbol Changes — NASDAQ · NYSE · ASX · CSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #3b6fd4;
    --blue-dark: #2f5cb8;
    --text: #1a1f2e;
    --muted: #6b7280;
    --row-alt: #f7f8fb;
    --border: #e7e9f0;
    --pill: #4a7de0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: #F5F9FD;
    padding: 32px 16px;
  }
  .wrap { max-width: 1200px; margin: 0 auto; }
  .sub { color: var(--muted); margin: 0 0 20px; font-size: 14px; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    margin-bottom: 10px;
  }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; }
  .tab {
    border: 1px solid var(--border); background: #fff; color: var(--text);
    padding: 7px 14px; border-radius: 999px; font-size: 13px; cursor: pointer;
  }
  .tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  .search-wrap { position: relative; margin-left: auto; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: .45; pointer-events: none; }
  #search {
    padding: 8px 30px 8px 32px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; min-width: 240px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  #search:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,111,212,.12); }
  #searchClear {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    border: none; background: none; color: var(--muted); font-size: 18px;
    line-height: 1; cursor: pointer; padding: 4px 6px; border-radius: 50%;
  }
  #searchClear:hover { background: var(--row-alt); color: var(--text); }

  .result-count { color: var(--muted); font-size: 13px; margin: 0 0 10px 2px; }

  .table-card { border-radius: 14px; overflow: hidden; box-shadow: 0 1px 3px rgba(20,30,60,.08); border: 1px solid var(--border); background: #fff; }
  .scroller { overflow: auto; max-height: 700px; }
  table { width: 100%; border-collapse: collapse; min-width: 820px; table-layout: fixed; }
  col.col-company { width: 32%; }
  col.col-ticker { width: 15%; }
  col.col-exchange { width: 13%; }
  col.col-date { width: 17%; }
  col.col-type { width: 23%; }
  thead th {
    position: sticky; top: 0; z-index: 1;
    background: var(--blue); color: #fff; text-align: left;
    font-size: 16px; font-weight: 700; padding: 15px 18px;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th .arrow { font-size: 11px; opacity: .85; margin-left: 4px; }
  tbody td {
    padding: 15px 18px; font-size: 15px; border-top: 1px solid var(--border);
    vertical-align: top; height: 74px; overflow: hidden;
  }
  tbody td.company { font-weight: 500; }
  .company-name {
    display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .formerly { display: block; margin-top: 3px; font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tbody tr:nth-child(even) { background: #fff; }
  tbody tr:hover { background: #eef3fd; }
  .ticker {
    display: inline-block; background: var(--pill); color: #fff;
    padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 600;
    white-space: nowrap;
  }
  .ticker.was { background: #d6dae6; color: #5a6070; font-size: 11px; margin-left: 5px; padding: 2px 8px; }
  .exch a { color: var(--blue); text-decoration: none; white-space: nowrap; }
  .exch a:hover { text-decoration: underline; }
  .muted { color: var(--muted); }
  .empty-state { padding: 40px; text-align: center; color: var(--muted); }

  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    white-space: nowrap;
  }
  .change-badge { background: #ece3fc; color: #6a3fc9; }

  .foot {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between;
    padding: 14px 4px 0; color: var(--muted); font-size: 14px;
  }
  .foot a { color: var(--blue); font-weight: 600; text-decoration: none; }
  .foot a:hover { text-decoration: underline; }
  .dot { color: #b3b9c9; margin: 0 4px; }
  .note { margin-top: 10px; }
  .note a { color: var(--blue); }

  @media (max-width: 640px) {
    .search-wrap { margin-left: 0; width: 100%; }
    #search { width: 100%; }
    thead th, tbody td { padding: 11px 12px; font-size: 13.5px; }
    thead th { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="controls">
    <div class="tabs" id="tabs"></div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="search" type="text" placeholder="Search old or new company/ticker…" autocomplete="off">
      <button id="searchClear" type="button" aria-label="Clear search" hidden>&times;</button>
    </div>
  </div>

  <p class="result-count" id="resultCount"></p>

  <div class="table-card">
    <div class="scroller">
      <table>
        <colgroup>
          <col class="col-company"><col class="col-ticker"><col class="col-exchange"><col class="col-date"><col class="col-type">
        </colgroup>
        <thead>
          <tr>
            <th data-sort="new_name">Company<span class="arrow"></span></th>
            <th data-sort="new_ticker">Ticker<span class="arrow"></span></th>
            <th data-sort="exchange">Exchange<span class="arrow"></span></th>
            <th data-sort="date">Date<span class="arrow"></span></th>
            <th data-sort="change_type">Change Type<span class="arrow"></span></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="empty-state" id="empty" hidden></div>
  </div>

  <div class="foot">
    <span id="footLeft">Source: Exchange Filings</span>
    <span>Official sources:
      <a href="https://www.asx.com.au/markets/market-resources/asx-codes-and-descriptors/asx-code-changes" target="_blank" rel="noopener">ASX</a><span class="dot">&bull;</span>
      <a href="https://thecse.com/news/bulletins/" target="_blank" rel="noopener">CSE</a><span class="dot">&bull;</span>
      <a href="https://www.nasdaqtrader.com/Trader.aspx?id=symboldirdefs" target="_blank" rel="noopener">NASDAQ/NYSE</a><span class="dot">&bull;</span>
      <a href="http://infoventure.tsx.com/" target="_blank" rel="noopener">TSX Venture</a>
    </span>
  </div>
</div>

<script>
(function () {
  const EXCHANGES = ["All", "NASDAQ", "NYSE", "ASX", "CSE", "TSX"];
  const REFRESH_MS = 15 * 60 * 1000; // re-fetch the data file every 15 minutes

  let data = [];
  let filter = "All";
  let query = "";
  let sortKey = "date";
  let sortDir = -1;

  const rowsEl = document.getElementById("rows");
  const emptyEl = document.getElementById("empty");
  const tabsEl = document.getElementById("tabs");
  const footLeftEl = document.getElementById("footLeft");
  const resultCountEl = document.getElementById("resultCount");
  const searchEl = document.getElementById("search");
  const searchClearEl = document.getElementById("searchClear");

  EXCHANGES.forEach(function (ex) {
    const b = document.createElement("button");
    b.className = "tab" + (ex === filter ? " active" : "");
    b.textContent = ex;
    b.onclick = function () {
      filter = ex;
      tabsEl.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === b));
      render();
    };
    tabsEl.appendChild(b);
  });

  searchEl.addEventListener("input", function (e) {
    query = e.target.value.trim().toLowerCase();
    searchClearEl.hidden = !query;
    render();
  });
  searchClearEl.addEventListener("click", function () {
    searchEl.value = "";
    query = "";
    searchClearEl.hidden = true;
    searchEl.focus();
    render();
  });

  document.querySelectorAll("thead th").forEach(function (th) {
    th.addEventListener("click", function () {
      const key = th.dataset.sort;
      if (sortKey === key) { sortDir *= -1; }
      else { sortKey = key; sortDir = key === "date" ? -1 : 1; }
      render();
    });
  });

  function fmtDate(iso) {
    if (!iso) return null;
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("en-US", { month: "short", day: "2-digit", year: "numeric" });
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function matchesFilter(r) {
    if (filter === "All") return true;
    if (filter === "NYSE") return r.exchange === "NYSE" || r.exchange === "NYSE American";
    if (filter === "TSX") return r.exchange === "TSX" || r.exchange === "TSXV";
    return r.exchange === filter;
  }

  function arrowFor(key) {
    if (key !== sortKey) return "";
    return sortDir === 1 ? "▲" : "▼";
  }

  function render() {
    const all = data.filter(matchesFilter);
    const rows = all
      .filter(r => !query ||
        (r.new_name || "").toLowerCase().includes(query) ||
        (r.old_name || "").toLowerCase().includes(query) ||
        (r.new_ticker || "").toLowerCase().includes(query) ||
        (r.old_ticker || "").toLowerCase().includes(query))
      .sort(function (a, b) {
        const av = (a[sortKey] || "").toString();
        const bv = (b[sortKey] || "").toString();
        return av.localeCompare(bv) * sortDir;
      });

    document.querySelectorAll("thead th").forEach(function (th) {
      th.querySelector(".arrow").textContent = arrowFor(th.dataset.sort);
    });

    rowsEl.innerHTML = rows.map(function (r) {
      const date = fmtDate(r.date);
      const showOldTicker = r.old_ticker && r.old_ticker !== r.new_ticker;
      return "<tr>" +
        '<td class="company">' +
          '<span class="company-name" title="' + esc(r.new_name) + '">' + esc(r.new_name) + "</span>" +
          (r.old_name && r.old_name !== r.new_name
            ? '<span class="formerly" title="Formerly ' + esc(r.old_name) + '">Formerly ' + esc(r.old_name) + "</span>"
            : "") +
        "</td>" +
        "<td>" +
          '<span class="ticker">' + esc(r.new_ticker || "—") + "</span>" +
          (showOldTicker ? '<span class="ticker was">was ' + esc(r.old_ticker) + "</span>" : "") +
        "</td>" +
        '<td class="exch">' + (r.source
          ? '<a href="' + esc(r.source) + '" target="_blank" rel="noopener">' + esc(r.exchange) + "</a>"
          : esc(r.exchange)) + "</td>" +
        "<td>" +
          '<div class="date-main">' + (date ? esc(date) : '<span class="muted">&mdash;</span>') + "</div>" +
        "</td>" +
        "<td>" +
          '<span class="badge change-badge">' + esc(r.change_type || "") + "</span>" +
        "</td>" +
        "</tr>";
    }).join("");

    emptyEl.hidden = rows.length > 0;
    if (data.length === 0) {
      emptyEl.textContent = "No data yet — the update workflow hasn't run. Trigger \"Update IPO data\" under the repo's Actions tab.";
    } else {
      emptyEl.textContent = "No name/symbol changes match the current filter.";
    }

    resultCountEl.textContent = rows.length === 0 ? "" :
      rows.length + (rows.length === 1 ? " change" : " changes") +
      (rows.length > 10 ? " — scroll for more" : "");
  }

  function load() {
    fetch("data/rtos.json?t=" + Date.now())
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function (json) {
        data = json.rtos || [];
        footLeftEl.textContent = "Source: Exchange Filings" +
          (data.length ? " · " + data.length + " changes tracked" : "");
        render();
      })
      .catch(function () {
        render();
      });
  }

  load();
  setInterval(load, REFRESH_MS);
})();
</script>
</body>
</html>
